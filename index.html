<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --cyan: #00f2ff;
            --purple: #7000ff;
            --red: #ff0055;
            --glass: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width:100%; height:100%;
            background:var(--bg);
            color:#e0e0e6;
            font-family:'Outfit',sans-serif;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            touch-action:none;
        }
        #wrapper {
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:0.75rem;
            width:100%;
            padding:0.5rem;
        }
        #header {
            width:100%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            max-width:600px;
        }
        #title {
            font-size:clamp(1.4rem,5vw,2.2rem);
            font-weight:700;
            letter-spacing:0.2rem;
            background:linear-gradient(to right,var(--cyan),var(--purple));
            -webkit-background-clip:text;
            background-clip:text;
            -webkit-text-fill-color:transparent;
            filter:drop-shadow(0 0 8px rgba(0,242,255,0.4));
        }
        #scores {
            display:flex;
            gap:1.2rem;
        }
        .score-box {
            display:flex;
            flex-direction:column;
            align-items:flex-end;
        }
        .score-box .lbl {
            font-size:0.6rem;
            letter-spacing:0.1rem;
            color:rgba(255,255,255,0.4);
            text-transform:uppercase;
        }
        .score-box .val {
            font-size:clamp(1rem,4vw,1.4rem);
            font-weight:700;
            color:var(--cyan);
            text-shadow:0 0 10px var(--cyan);
        }
        #viewport {
            position:relative;
            border-radius:1rem;
            border:1px solid var(--border);
            box-shadow:0 0 30px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,242,255,0.04);
            overflow:hidden;
            background:radial-gradient(circle at center,#1a1a2a,#0a0a0c);
        }
        #game-canvas { display:block; }
        /* Overlay */
        #overlay {
            position:absolute;
            inset:0;
            background:rgba(10,10,12,0.88);
            backdrop-filter:blur(10px);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:20;
            transition:opacity 0.3s;
        }
        #overlay.hidden { opacity:0; pointer-events:none; }
        #overlay-content { text-align:center; padding:1rem; width:90%; max-width:320px; }
        #ov-title {
            font-size:clamp(1.8rem,6vw,2.8rem);
            font-weight:700;
            color:var(--cyan);
            text-shadow:0 0 20px var(--cyan);
            margin-bottom:1rem;
        }
        .form-group {
            display:flex;
            flex-direction:column;
            gap:0.75rem;
            margin-bottom:1rem;
        }
        .form-group input {
            background:rgba(0,0,0,0.5);
            border:1.5px solid var(--purple);
            border-radius:0.5rem;
            padding:0.75rem 1rem;
            color:#fff;
            font-family:'Outfit',sans-serif;
            font-size:1rem;
            outline:none;
            transition:border-color 0.3s, box-shadow 0.3s;
            width:100%;
        }
        .form-group input:focus {
            border-color:var(--cyan);
            box-shadow:0 0 12px rgba(0,242,255,0.25);
        }
        .form-group input::placeholder { color:rgba(255,255,255,0.3); }
        #ov-msg {
            font-size:0.85rem;
            color:rgba(255,255,255,0.6);
            margin-bottom:1.25rem;
            min-height:1.2em;
        }
        #start-btn {
            padding:0.85rem 2.5rem;
            font-size:1rem;
            font-weight:700;
            background:transparent;
            color:var(--purple);
            border:2px solid var(--purple);
            border-radius:0.5rem;
            cursor:pointer;
            text-transform:uppercase;
            letter-spacing:0.1rem;
            transition:all 0.3s;
            font-family:'Outfit',sans-serif;
        }
        #start-btn:active, #start-btn:hover {
            background:var(--purple);
            color:#fff;
            box-shadow:0 0 20px var(--purple);
            transform:translateY(-2px);
        }
        #footer {
            font-size:0.75rem;
            color:rgba(255,255,255,0.3);
            letter-spacing:0.05rem;
        }
    </style>
</head>
<body>
<div id="wrapper">
    <div id="header">
        <div id="title">SNAKE</div>
        <div id="scores">
            <div class="score-box">
                <span class="lbl">Score</span>
                <span class="val" id="cur-score">000</span>
            </div>
            <div class="score-box">
                <span class="lbl">Best</span>
                <span class="val" id="hi-score">000</span>
            </div>
        </div>
    </div>
    <div id="viewport">
        <canvas id="game-canvas"></canvas>
        <div id="overlay">
            <div id="overlay-content">
                <div id="ov-title">READY?</div>
                <div class="form-group">
                    <input id="inp-name" type="text" placeholder="Your Name" maxlength="25" autocomplete="off">
                    <input id="inp-roll" type="text" placeholder="Roll No" maxlength="15" autocomplete="off">
                </div>
                <div id="ov-msg">Enter your details to start</div>
                <button id="start-btn">START GAME</button>
            </div>
        </div>
    </div>
    <div id="footer">Move your cursor / finger to control the snake</div>
</div>

<!-- Hidden iframe + form — VERIFIED entry IDs from Google Form DOM -->
<iframe name="gframe" id="gframe" style="display:none;" onload="onFrameLoad()"></iframe>
<form id="gform"
      action="https://docs.google.com/forms/u/0/d/e/1FAIpQLScFYL8LnafwCCdSPLAMU_Zm5FNKeGAXbCvu7SHwW9T6L4QRgA/formResponse"
      method="POST"
      target="gframe"
      style="display:none;">
    <!-- entry.2005620554 = Name (verified from form DOM) -->
    <input type="text" name="entry.2005620554" id="g-name">
    <!-- entry.1045781291 = Roll no (verified from form DOM) -->
    <input type="text" name="entry.1045781291" id="g-roll">
    <!-- entry.1065046570 = Score (verified from form DOM) -->
    <input type="text" name="entry.1065046570" id="g-score">
</form>

<!-- Submission banner -->
<div id="submit-banner" style="
    display:none; position:fixed; bottom:1rem; left:50%; transform:translateX(-50%);
    background:rgba(0,242,255,0.15); border:1px solid #00f2ff;
    color:#00f2ff; font-family:'Outfit',sans-serif; font-size:0.85rem;
    padding:0.6rem 1.4rem; border-radius:2rem;
    box-shadow:0 0 20px rgba(0,242,255,0.3); z-index:999;
    animation: fadeup 0.4s ease;
">✅ Score submitted to Google Sheet!</div>

<style>
@keyframes fadeup {
    from { opacity:0; transform:translateX(-50%) translateY(10px); }
    to   { opacity:1; transform:translateX(-50%) translateY(0); }
}
</style>

<script>
// ─── Setup ─────────────────────────────────────────────────────
const canvas    = document.getElementById('game-canvas');
const ctx       = canvas.getContext('2d');
const overlay   = document.getElementById('overlay');
const ovTitle   = document.getElementById('ov-title');
const ovMsg     = document.getElementById('ov-msg');
const startBtn  = document.getElementById('start-btn');
const curEl     = document.getElementById('cur-score');
const hiEl      = document.getElementById('hi-score');
const viewport  = document.getElementById('viewport');

// Responsive canvas size
function getSize() {
    const maxW = Math.min(window.innerWidth - 16, 600);
    const maxH = Math.min(window.innerHeight - 160, 600);
    return Math.floor(Math.min(maxW, maxH));
}

let SZ = getSize();
canvas.width  = SZ;
canvas.height = SZ;
viewport.style.width  = SZ + 'px';
viewport.style.height = SZ + 'px';

window.addEventListener('resize', () => {
    SZ = getSize();
    canvas.width  = SZ;
    canvas.height = SZ;
    viewport.style.width  = SZ + 'px';
    viewport.style.height = SZ + 'px';
    if (!running) drawIdle();
});

// ─── Constants & State ─────────────────────────────────────────
const SPEED        = 3.2;
const SEG_DIST     = 10;
const HEAD_R       = 10;
const FOOD_R       = 8;
const INVULN_MS    = 2000;

let snake=[], food={x:0,y:0}, score=0;
let highScore = Number(localStorage.getItem('neon-snake-hi') || 0);
let running=false, rafId=null;
let target={x:0,y:0};
let startTs=0;
let playerName='', playerRoll='';

hiEl.textContent = String(highScore).padStart(3,'0');

// ─── Init ───────────────────────────────────────────────────────
function initGame() {
    const cx = SZ/2, cy = SZ/2;
    snake = [];
    for (let i=0;i<15;i++) snake.push({x:cx-i*SEG_DIST, y:cy, a:0});
    target = {x:cx+120, y:cy};
    score = 0;
    curEl.textContent = '000';
    placeFood();
}

function placeFood() {
    const pad = FOOD_R*2;
    food.x = pad + Math.random()*(SZ-pad*2);
    food.y = pad + Math.random()*(SZ-pad*2);
}

// ─── Movement ───────────────────────────────────────────────────
function tick() {
    const h = snake[0];
    const dx=target.x-h.x, dy=target.y-h.y;
    const ta = Math.atan2(dy,dx);
    let da = ta - h.a;
    while(da < -Math.PI) da+=Math.PI*2;
    while(da >  Math.PI) da-=Math.PI*2;
    h.a += da*0.22;
    h.x += Math.cos(h.a)*SPEED;
    h.y += Math.sin(h.a)*SPEED;

    for (let i=1;i<snake.length;i++) {
        const p=snake[i-1], c=snake[i];
        const dx=p.x-c.x, dy=p.y-c.y;
        const d=Math.hypot(dx,dy);
        if (d>SEG_DIST) {
            const a=Math.atan2(dy,dx);
            c.x=p.x-Math.cos(a)*SEG_DIST;
            c.y=p.y-Math.sin(a)*SEG_DIST;
            c.a=a;
        }
    }
    checkCollisions();
}

function checkCollisions() {
    const h = snake[0];
    // Wall
    if (h.x<0||h.x>SZ||h.y<0||h.y>SZ) { endGame(); return; }
    // Self
    if (performance.now()-startTs > INVULN_MS) {
        for (let i=18;i<snake.length;i++) {
            if (Math.hypot(h.x-snake[i].x, h.y-snake[i].y) < HEAD_R*0.75) { endGame(); return; }
        }
    }
    // Food
    if (Math.hypot(h.x-food.x, h.y-food.y) < HEAD_R+FOOD_R) {
        score += 10;
        curEl.textContent = String(score).padStart(3,'0');
        if (score > highScore) {
            highScore = score;
            hiEl.textContent = String(highScore).padStart(3,'0');
            localStorage.setItem('neon-snake-hi', highScore);
        }
        placeFood();
        const tail = snake[snake.length-1];
        for (let i=0;i<4;i++) snake.push({...tail});
    }
}

// ─── Render ─────────────────────────────────────────────────────
function draw() {
    ctx.clearRect(0,0,SZ,SZ);
    // Grid
    ctx.strokeStyle='rgba(255,255,255,0.03)';
    ctx.lineWidth=1;
    for(let i=0;i<=SZ;i+=40){
        ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,SZ);ctx.stroke();
        ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(SZ,i);ctx.stroke();
    }
    // Food
    ctx.shadowColor='#ff0055'; ctx.shadowBlur=20;
    ctx.fillStyle='#ff0055';
    ctx.beginPath(); ctx.arc(food.x,food.y,FOOD_R,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#22ff88';
    ctx.beginPath(); ctx.ellipse(food.x+2,food.y-FOOD_R-1,3,5,Math.PI/4,0,Math.PI*2); ctx.fill();

    // Snake body (back to front)
    for (let i=snake.length-1;i>=0;i--) {
        const s=snake[i], head=i===0;
        const t=i/(snake.length-1||1);
        const r=head ? HEAD_R+2 : HEAD_R*(1-t*0.55);
        ctx.shadowBlur=head?22:10;
        ctx.shadowColor=head?'#00f2ff':'#7000ff';
        ctx.fillStyle=head?'#00f2ff':'#7000ff';
        ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2); ctx.fill();
        // Scale pattern
        if (!head && i%2===0) {
            ctx.shadowBlur=0;
            ctx.strokeStyle='rgba(255,255,255,0.08)';
            ctx.lineWidth=1;
            ctx.beginPath(); ctx.arc(s.x,s.y,r*0.6,s.a-Math.PI/2,s.a+Math.PI/2); ctx.stroke();
        }
        if (head) {
            // Tongue
            if (Math.sin(performance.now()/130)>0.65) {
                ctx.strokeStyle='#ff0055'; ctx.lineWidth=2; ctx.shadowBlur=0;
                const tx=s.x+Math.cos(s.a)*(r+1), ty=s.y+Math.sin(s.a)*(r+1);
                ctx.beginPath(); ctx.moveTo(tx,ty);
                ctx.lineTo(tx+Math.cos(s.a)*11,ty+Math.sin(s.a)*11); ctx.stroke();
            }
            // Eyes
            ctx.shadowBlur=0; ctx.fillStyle='white';
            const ed=6, ea=0.58;
            const ex1=s.x+Math.cos(s.a-ea)*ed, ey1=s.y+Math.sin(s.a-ea)*ed;
            const ex2=s.x+Math.cos(s.a+ea)*ed, ey2=s.y+Math.sin(s.a+ea)*ed;
            ctx.beginPath(); ctx.arc(ex1,ey1,3,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex2,ey2,3,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#000';
            ctx.beginPath(); ctx.arc(ex1+Math.cos(s.a),ey1+Math.sin(s.a),1.5,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex2+Math.cos(s.a),ey2+Math.sin(s.a),1.5,0,Math.PI*2); ctx.fill();
        }
    }
}

function drawIdle() { initGame(); draw(); }

function loop() {
    if (!running) return;
    tick(); draw();
    rafId = requestAnimationFrame(loop);
}

// ─── Input ──────────────────────────────────────────────────────
function setTarget(e) {
    if (!running) return;
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    target.x = src.clientX - rect.left;
    target.y = src.clientY - rect.top;
}
canvas.addEventListener('mousemove', setTarget);
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); setTarget(e); }, {passive:false});
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); setTarget(e); }, {passive:false});

// ─── Start / End ────────────────────────────────────────────────
startBtn.addEventListener('click', startGame);

function startGame() {
    const n = document.getElementById('inp-name').value.trim();
    const r = document.getElementById('inp-roll').value.trim();
    if (!n || !r) {
        ovMsg.textContent = '⚠️ Please fill in both fields!';
        ovMsg.style.color = '#ff0055';
        return;
    }
    playerName = n; playerRoll = r;
    document.getElementById('inp-name').blur();
    document.getElementById('inp-roll').blur();

    initGame();
    running  = true;
    startTs  = performance.now();
    overlay.classList.add('hidden');
    rafId = requestAnimationFrame(loop);
}

function endGame() {
    running = false;
    cancelAnimationFrame(rafId);
    submitScore();
    ovTitle.textContent  = 'GAME OVER';
    ovMsg.textContent    = `Your score: ${score}`;
    ovMsg.style.color    = 'rgba(255,255,255,0.7)';
    startBtn.textContent = 'PLAY AGAIN';
    overlay.classList.remove('hidden');
}

// ─── Google Form Submission ──────────────────────────────────────
// Fires when the hidden iframe loads (=form submitted successfully)
let frameLoaded = false;
function onFrameLoad() {
    if (!frameLoaded) { frameLoaded = true; return; } // skip initial blank load
    const banner = document.getElementById('submit-banner');
    banner.style.display = 'block';
    setTimeout(() => { banner.style.display = 'none'; }, 4000);
}

function submitScore() {
    // Warn if running on file:// — cross-origin POST will be blocked
    if (location.protocol === 'file:') {
        console.warn('⚠️ Running on file:// — form POST blocked by browser. Use: npm run dev');
        const banner = document.getElementById('submit-banner');
        banner.style.background = 'rgba(255,0,85,0.15)';
        banner.style.borderColor = '#ff0055';
        banner.style.color = '#ff0055';
        banner.textContent = '⚠️ Run via npm run dev to submit scores!';
        banner.style.display = 'block';
        setTimeout(() => { banner.style.display = 'none'; }, 5000);
        return;
    }
    try {
        frameLoaded = false; // reset so next load = confirmation
        document.getElementById('g-name').value  = playerName;
        document.getElementById('g-roll').value  = playerRoll;
        document.getElementById('g-score').value = score;
        document.getElementById('gform').submit();
        console.log('📤 Submitting to Google Sheet:', playerName, playerRoll, score);
    } catch(e) {
        console.error('❌ Submission error:', e);
    }
}

function endGame() {
    running = false;
    cancelAnimationFrame(rafId);
    submitScore();
    ovTitle.textContent   = 'GAME OVER';
    ovMsg.textContent     = `Your score: ${score}`;
    ovMsg.style.color     = 'rgba(255,255,255,0.7)';
    startBtn.textContent  = 'PLAY AGAIN';
    overlay.classList.remove('hidden');
}

canvas.addEventListener('mousemove', setTarget);
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); setTarget(e); }, {passive:false});
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); setTarget(e); }, {passive:false});
startBtn.addEventListener('click', startGame);
drawIdle();
</script>
</body>
</html>
